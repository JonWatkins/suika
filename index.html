<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <div id="app"></div>
  <script type="module">
    import { Suika, mount, Component, h } from './src/index.ts';
    const root = document.getElementById('app')

    const Count = ({ key, count }) => {
      return h('p', { key }, count)
    }

    const Button = ({ key, inc }) => {
      return h('button', { key, onclick: inc }, 'inc count')
    } 

    class Counter extends Component {
      state = {
        count:  0
      }
      inc() {
        this.state.count++
      }
      render() {
        return h('div', { key: this.props.key },
          h(Count, { key: 1, count: this.state.count.toString() }),
          h(Button, { key: 2, inc: () => this.inc() })
        )
      }
    }

    function Group (props, children) {
      return h('div', props, ...children)
    }

    function Input () {
      return h('input')
    }

    function Btn() {
      return h('button', {}, 'meh')
    }

    class App extends Suika {
      render() {
        return h('div', { key: 'root' }, 
          h(Group, {}, 
            h(Input),
            h(Btn)
          )
        )
      }
    }

    mount(App, root)
  </script>
</body>
</html>
